<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="res.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Reset Password</title>
</head>
<body>
    <h1 style="font-weight: 500;">HEALTH MONITORING</h1>
    <div class="container">
        <div class="form">
            <h1 style="font-weight: 500;">Reset Password</h1>
            <div class="input">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Email" id="email" required>
            </div>
            <p id="msg" style="color: red; font-size: 0.65rem; text-align: center;"></p>
            <button id="submit" type="submit">Reset</button>
            <p><a href="log.html">Back to Login</a></p>
        </div>
    </div>
    
    <script type="module" src="reset.js"></script>
</body>
</html>
